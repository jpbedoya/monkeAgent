<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0A0E0B; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { display: flex; gap: 60px; }
        .option { text-align: center; }
        .logo-box { 
            background: #111714; 
            border: 1px solid rgba(74,143,93,0.18); 
            border-radius: 16px; 
            padding: 40px;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h3 { color: #86C994; margin-top: 20px; font-family: Inter, sans-serif; }
        p { color: rgba(134,201,148,0.5); font-size: 14px; font-family: Inter, sans-serif; }
    </style>
</head>
<body>
    <div class="container">
        <div class="option">
            <div class="logo-box">
                <img src="/m-agent-logo.svg" width="120" height="120" />
            </div>
            <h3>Option 1: M + Agent</h3>
            <p>Sophisticated, tech-forward<br>Neural network node accent</p>
        </div>
        
        <div class="option">
            <div class="logo-box">
                <img src="/m-logo.svg" width="120" height="120" />
            </div>
            <h3>Option 2: Simple M</h3>
            <p>Clean MonkeDAO M<br>Minimal, recognizable</p>
        </div>
    </div>
</body>
</html>
