<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0A0E0B 0%, #0D1A10 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .container {
            text-align: center;
            padding: 60px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: rgba(74,143,93,0.2);
            border: 2px solid #4A8F5D;
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo svg {
            width: 50px;
            height: 50px;
        }
        h1 {
            font-size: 64px;
            font-weight: 800;
            color: #F0F7F1;
            margin-bottom: 20px;
            letter-spacing: -0.03em;
        }
        .subtitle {
            font-size: 28px;
            color: rgba(134,201,148,0.8);
            margin-bottom: 40px;
        }
        .badges {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .badge {
            padding: 12px 24px;
            background: rgba(74,143,93,0.2);
            border: 1px solid rgba(74,143,93,0.4);
            border-radius: 30px;
            color: #86C994;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 60 L15 30 Q15 20 25 20 Q30 20 35 25 L40 30 L45 25 Q50 20 55 20 Q65 20 65 30 L65 60" 
                      stroke="#86C994" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="28" cy="35" r="3" fill="#86C994"/>
                <circle cx="52" cy="35" r="3" fill="#86C994"/>
            </svg>
        </div>
        <h1>MonkeAgent</h1>
        <p class="subtitle">Your Personal AI Assistant, Deployed in Minutes</p>
        <div class="badges">
            <div class="badge">No Terminal</div>
            <div class="badge">No Setup</div>
            <div class="badge">Just Works</div>
        </div>
    </div>
</body>
</html>
