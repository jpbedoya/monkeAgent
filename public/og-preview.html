<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0A0E0B 0%, #0F1510 50%, #0D1A10 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Inter', sans-serif;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }
        
        /* Background pattern */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(74,143,93,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .left-content {
            flex: 1;
            z-index: 2;
        }
        
        .logo-line {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .logo {
            width: 60px;
            height: 60px;
            background: rgba(74,143,93,0.15);
            border: 2px solid rgba(74,143,93,0.5);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .brand {
            font-size: 32px;
            font-weight: 800;
            color: #E8F0E9;
            letter-spacing: -0.02em;
        }
        
        h1 {
            font-size: 56px;
            font-weight: 800;
            color: #F0F7F1;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
        }
        
        .highlight {
            color: #86C994;
        }
        
        .subtitle {
            font-size: 24px;
            color: rgba(134,201,148,0.7);
            line-height: 1.4;
            margin-bottom: 40px;
        }
        
        .features {
            display: flex;
            gap: 20px;
        }
        
        .feature {
            padding: 10px 20px;
            background: rgba(74,143,93,0.1);
            border: 1px solid rgba(74,143,93,0.3);
            border-radius: 25px;
            color: #86C994;
            font-size: 16px;
            font-weight: 600;
        }
        
        .phone-mockup {
            width: 280px;
            background: #0F1510;
            border: 2px solid rgba(74,143,93,0.3);
            border-radius: 38px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            z-index: 2;
        }
        
        .phone-notch {
            height: 38px;
            background: #0A0E0B;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .notch {
            width: 80px;
            height: 5px;
            background: #1E2620;
            border-radius: 5px;
        }
        
        .phone-header {
            background: #17211A;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(74,143,93,0.15);
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(74,143,93,0.2);
            border: 2px solid rgba(74,143,93,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .operator-info {
            flex: 1;
        }
        
        .operator-name {
            font-size: 14px;
            font-weight: 700;
            color: #E8F2EA;
        }
        
        .operator-status {
            font-size: 11px;
            color: #86C994;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: #86C994;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chat-area {
            padding: 16px;
            height: 320px;
            background: #0F1510;
        }
        
        .message {
            margin-bottom: 12px;
        }
        
        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 13px;
            line-height: 1.5;
            max-width: 85%;
        }
        
        .msg-ai {
            background: #1E2E21;
            border: 1px solid rgba(74,143,93,0.2);
            color: #C8E8CC;
            border-radius: 16px 16px 16px 4px;
        }
        
        .msg-user {
            background: #184623;
            color: #D4F0D8;
            border-radius: 16px 16px 4px 16px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="left-content">
        <div class="logo-line">
            <div class="logo">
                <svg width="36" height="36" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 60 L15 30 Q15 20 25 20 Q30 20 35 25 L40 30 L45 25 Q50 20 55 20 Q65 20 65 30 L65 60" 
                          stroke="#E8F0E9" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="28" cy="35" r="3" fill="#E8F0E9"/>
                    <circle cx="52" cy="35" r="3" fill="#E8F0E9"/>
                </svg>
            </div>
            <div class="brand">MonkeAgent</div>
        </div>
        
        <h1>Your Personal AI<br>Assistant. <span class="highlight">Deployed.</span></h1>
        
        <p class="subtitle">No terminal. No server setup.<br>Just your AI, running 24/7.</p>
        
        <div class="features">
            <div class="feature">Setup in Minutes</div>
            <div class="feature">$9/mo</div>
            <div class="feature">OpenClaw</div>
        </div>
    </div>
    
    <div class="phone-mockup">
        <div class="phone-notch">
            <div class="notch"></div>
        </div>
        
        <div class="phone-header">
            <div class="avatar">
                <svg width="24" height="24" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 60 L15 30 Q15 20 25 20 Q30 20 35 25 L40 30 L45 25 Q50 20 55 20 Q65 20 65 30 L65 60" 
                          stroke="#E8F0E9" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="operator-info">
                <div class="operator-name">My Operator</div>
                <div class="operator-status">online</div>
            </div>
            <div class="status-dot"></div>
        </div>
        
        <div class="chat-area">
            <div class="message">
                <div class="msg-bubble msg-ai">Good morning! Here's your schedule for today.</div>
            </div>
            <div class="message">
                <div class="msg-bubble msg-user">Summarize my emails</div>
            </div>
            <div class="message">
                <div class="msg-bubble msg-ai">✓ 4 emails summarized<br>✓ 3 drafts prepared<br>✓ Calendar updated</div>
            </div>
        </div>
    </div>
</body>
</html>
