<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E0B"/>
      <stop offset="100%" style="stop-color:#0D1A10"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Logo -->
  <g transform="translate(600, 180)">
    <rect x="-40" y="-40" width="80" height="80" rx="16" fill="rgba(74,143,93,0.15)" stroke="#4A8F5D" stroke-width="2"/>
    <path d="M-25 20 L-25 -10 Q-25 -20 -15 -20 Q-10 -20 -5 -15 L0 -10 L5 -15 Q10 -20 15 -20 Q25 -20 25 -10 L25 20" 
          stroke="#E8F0E9" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-12" cy="-5" r="2.5" fill="#E8F0E9"/>
    <circle cx="12" cy="-5" r="2.5" fill="#E8F0E9"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="320" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="#F0F7F1" text-anchor="middle" letter-spacing="-2">MonkeAgent</text>
  
  <!-- Subtitle -->
  <text x="600" y="380" font-family="Inter, sans-serif" font-size="28" fill="rgba(134,201,148,0.8)" text-anchor="middle">Your Personal AI Assistant, Deployed in Minutes</text>
  
  <!-- Features -->
  <g transform="translate(600, 460)">
    <rect x="-280" y="-25" width="160" height="50" rx="25" fill="rgba(74,143,93,0.2)" stroke="rgba(74,143,93,0.4)"/>
    <text x="-200" y="5" font-family="Inter, sans-serif" font-size="18" fill="#86C994" text-anchor="middle">No Terminal</text>
    
    <rect x="-80" y="-25" width="160" height="50" rx="25" fill="rgba(74,143,93,0.2)" stroke="rgba(74,143,93,0.4)"/>
    <text x="0" y="5" font-family="Inter, sans-serif" font-size="18" fill="#86C994" text-anchor="middle">No Setup</text>
    
    <rect x="120" y="-25" width="160" height="50" rx="25" fill="rgba(74,143,93,0.2)" stroke="rgba(74,143,93,0.4)"/>
    <text x="200" y="5" font-family="Inter, sans-serif" font-size="18" fill="#86C994" text-anchor="middle">Just Works</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="560" font-family="Inter, sans-serif" font-size="20" fill="rgba(134,201,148,0.5)" text-anchor="middle">agent.monke.is</text>
</svg>
